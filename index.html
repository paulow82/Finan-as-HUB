<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dashboard Financeiro</title>

    <!-- 1. Babel para transpilação de JSX/TSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 2. Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3b82f6',
              success: '#10b981',
              danger: '#ef4444',
            },
            animation: {
              'toast-in': 'toast-in 0.5s ease-out forwards',
              'toast-out': 'toast-out 0.5s ease-in forwards',
              'fade-in': 'fade-in 0.3s ease-out forwards',
            },
            keyframes: {
              'toast-in': { '0%': { transform: 'translateX(100%)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } },
              'toast-out': { '0%': { transform: 'translateX(0)', opacity: '1' }, '100%': { transform: 'translateX(100%)', opacity: '0' } },
              'fade-in': { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
            }
          }
        }
      }
    </script>
    
    <!-- 3. Estilos de bibliotecas via CDN -->
    <link rel="stylesheet" href="https://unpkg.com/react-grid-layout/css/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/react-resizable/css/styles.css" />

    <!-- 4. Estilos personalizados locais -->
    <link rel="stylesheet" href="./index.css" />

    <!-- 5. Import Map para resolver dependências de JS -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0?dev",
    "react-dom": "https://esm.sh/react-dom@18.2.0?dev",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime?dev",
    "react/jsx-dev-runtime": "https://esm.sh/react@18.2.0/jsx-dev-runtime?dev",
    "react-grid-layout": "https://esm.sh/react-grid-layout@1.4.4?external=react,react-dom",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "@hello-pangea/dnd": "https://esm.sh/@hello-pangea/dnd@16.6.0?external=react,react-dom",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.43.4",
    "lucide-react": "https://esm.sh/lucide-react@0.395.0?external=react",
    "date-fns": "https://esm.sh/date-fns@3.6.0",
    "clsx": "https://esm.sh/clsx@2.1.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div id="root"></div>
    <div id="toast-container" class="fixed top-5 right-5 z-[10000] space-y-3"></div>
    
    <!-- 6. Ponto de entrada da aplicação -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
